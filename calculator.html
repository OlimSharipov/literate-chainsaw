<!DOCTYPE html>
<html lang="ru">
<head>
<link rel="slytesheet" type="text/css" href="style.css">
    <meta charset="UTF-8">
    <title>Калькулятор рациона спортсмена</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 20px auto; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        button { background: #4CAF50; color: white; padding: 12px 20px; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #45a049; }
        #result { margin-top: 20px; padding: 15px; border-radius: 4px; background: #f9f9f9; display: none; }
    </style>
</head>
<body>
    <h1>Калькулятор рациона юного спортсмена</h1>

    <div class="form-group">
        <label for="age">Возраст (лет):</label>
        <input type="number" id="age" min="10" max="18" required>
    </div>

    <div class="form-group">
        <label for="weight">Вес (кг):</label>
        <input type="number" id="weight" min="30" max="120" step="0.1" required>
    </div>

    <div class="form-group">
        <label for="height">Рост (см):</label>
        <input type="number" id="height" min="140" max="220" required>
    </div>

    <div class="form-group">
        <label for="gender">Пол:</label>
        <select id="gender" required>
            <option value="">Выберите</option>
            <option value="male">Мужской</option>
            <option value="female">Женский</option>
        </select>
    </div>

    <div class="form-group">
        <label for="activity">Интенсивность тренировок:</label>
        <select id="activity" required>
            <option value="">Выберите</option>
            <option value="1.375">Лёгкая (1–3 раза/нед.)</option>
            <option value="1.55">Умеренная (3–5 раз/нед.)</option>
            <option value="1.725">Высокая (6–7 раз/нед.)</option>
        </select>
    </div>

    <button onclick="calculate()">Рассчитать рацион</button>

    <div id="result"></div>

    <script src="script.js"></script>
<script src="script.js"></script>
</body>
jekyll-theme-NAME
</html>
